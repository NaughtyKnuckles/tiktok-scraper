name: TikTok Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write cookies from secret
        run: echo '${{ secrets.TIKTOK_COOKIES }}' > cookies.json

      - name: Write Telegram config
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "CHAT_ID=${{ secrets.CHAT_ID }}" >> .env

      - name: Run scraper
        run: python main.py

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: results/
