name: TikTok Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install libasound2 fix for Ubuntu 24
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libasound2t64.so.2 /usr/lib/x86_64-linux-gnu/libasound.so.2

      - name: Install Python dependencies
        run: |
          pip install "playwright==1.47.0"
          pip install supabase python-dotenv schedule python-telegram-bot

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Write cookies from secret
        run: echo '${{ secrets.TIKTOK_COOKIES }}' > cookies.json

      - name: Write Telegram config
        run: |
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
          echo "CHAT_ID=${{ secrets.CHAT_ID }}" >> .env

      - name: Run scraper
        run: python main.py

      - name: Upload results CSV
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: results/
